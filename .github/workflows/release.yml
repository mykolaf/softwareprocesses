# This is a basic workflow to help you get started with Actions

name: Release CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "release/**" ]
  pull_request:
    branches: [ "release/**" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: self-hosted

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo "I am on release pipeline"

      - name: Build the project with gradle
        run: docker run --rm -e GRADLE_USER_HOME=/build/.gradle-home -u "$(id -u):$(id -g)" -v "$(pwd)":/build -w /build gradle:jdk21 gradle build

      - name: Build bootJar
        run: docker run --rm -e GRADLE_USER_HOME=/build/.gradle-home -u "$(id -u):$(id -g)" -v "$(pwd)":/build -w /build gradle:jdk21 gradle bootJar

      - name: Gradle jar
        run: docker run --rm -e GRADLE_USER_HOME=/build/.gradle-home -u "$(id -u):$(id -g)" -v "$(pwd)":/build -w /build gradle:jdk21 gradle jar

      - name: Export dependencies
        run: docker run --rm -e GRADLE_USER_HOME=/build/.gradle-home -u "$(id -u):$(id -g)" -v "$(pwd)":/build -w /build gradle:jdk21 gradle dependencies

      - name: Run Gradle tests
        run: docker run --rm -e GRADLE_USER_HOME=/build/.gradle-home -u "$(id -u):$(id -g)" -v "$(pwd)":/build -w /build gradle:jdk21 gradle test

      - name: Run JaCoCo test report
        run: |
          docker run --rm \
            -e GRADLE_USER_HOME=/build/.gradle-home \
            -u "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/build" \
            -w /build \
            gradle:jdk21 \
            gradle build test jacocoTestReport

      - name: Add JaCoCo Report to PR
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.TOKEN }}
          min-coverage-overall: 60
          title: "Code Coverage Report"
          update-comment: true

      - name: Upload JaCoCo HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: ${{ github.workspace }}/build/reports/jacoco/test/html/
          retention-days: 30

      - name: Generate PDF docs using Pandoc
        run: |
          docker run --rm \
            --volume "${{ github.workspace }}:/data" \
            --user $(id -u):$(id -g) \
            --workdir /data \
            pandoc/latex README.md -o docs.pdf

      - name: Upload PDF Doc
        uses: actions/upload-artifact@v4
        with:
          name: docs.pdf
          path: ${{ github.workspace }}/docs.pdf
          retention-days: 30

      - name: List output
        run: ls
